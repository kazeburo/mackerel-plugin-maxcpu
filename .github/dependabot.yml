version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci:"
    cooldown:
      default-days: 7
    groups:
      dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 20

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "go:"
    groups:
      dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 20
